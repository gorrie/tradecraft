name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov
      - name: Tests + 100% coverage gate (deterministic)
        run: pytest -q --cov=tradecraft --cov-report=term-missing --cov-fail-under=85
      - name: Lenses load + demo (offline, no API key)
        run: |
          python -m tradecraft.cli lenses
          python -m tradecraft.cli demo
      - name: Eval — known-positive corpus (offline cues floor, strict)
        run: python eval/run_eval.py cues --strict
